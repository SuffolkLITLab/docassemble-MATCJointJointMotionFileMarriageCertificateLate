---
id: Joint_motion_to_file_marriage_certificate_late
continue button field: jointmotiontofilemarriagecertificatelate_intro
question: |
  Joint motion to file marriage certificate late
subquestion: |
  This interview will help you file a joint motion to file marriage certificate late if not submitting with petition.
  
  Before you get started, please gather:
  
  1. Marriage information (Date, location)
  2. Information about how to obtain a certified copy of your marriage certificate and/or translation. 
   
  
  When you are finished, you will need to:
  
  1. File this motion with your joint petition. 
  2. Obtain a certified copy of your marriage certificate and/or translation and file with the court as soon as possible.

  If you are a couple filing a joint petition for divorce you can use this interview to file a joint motion to file marriage certificate late if not submitting certified copy of marriage certificate with petition.

  Most people take about 10 minutes to complete this interview.
---
sets: 
  - users[i].name.first
  - users[i].name.last
  - users[i].name.middle
  - users[i].name.suffix  
id: Petitioner name fields
question: |
  % if i == 0:
  Petitioner A
  % elif i == 1:
  Petitioner B
  % else:
  Petitioner Name
  % endif
subquestion: |
  % if i == 1:
  Who is ${ users[0] }'s spouse?
  % else:
  What is your name?
  % endif
fields:
  - code: |
      users[i].name_fields()
---
id: users_limit
depends on:
  - users
code: |
  users.there_is_another = (len(users) < 2)
---
id: Marriage Details
question: |
  Marriage Details
subquestion: |
  When and where did ${ users[0] } and ${ users[1] } get married?
fields:
  - "Date of marriage ceremony": marriage_date
    datatype: date
  - "City where marriage took place": marriage_city
  - "Marriage occurred outside the United States?": international_marriage
    datatype: yesnoradio
  - "State where marriage took place": marriage_state
    required: False
    show if:
      variable: international_marriage
      is: False
  - "Country where marriage took place": marriage_country
    required: False
    show if:
      variable: international_marriage
      is: True
---
id: Certified marriage certificate
question: |
  Certified marriage certificate
fields:
  - "Do you already have a certified copy of your marriage certificate?": has_certified_marriage_certificate
    datatype: yesnoradio
  - "Upload your certified marriage certificate (optional)": uploaded_marriage_certificate
    datatype: file
    required: False
    show if:
      variable: has_certified_marriage_certificate
      is: True
---
id: Reason for Delay
question: |
  Reason for Delay
subquestion: |
  Tell the court why you do not have your certified marriage certificate yet and what you are doing to get it.

  You can copy and paste one of these examples, then edit it to match your situation:

  ${ collapse_template(order_certified_copy_example) }
  ${ collapse_template(translation_example) }
  ${ collapse_template(urgent_filing_example) }
fields:
  - "Reason for marriage certificate delay": marriage_proof_delay_reason
    input type: area
  - "Plan to obtain and submit certified copy of marriage certificate": marriage_proof_delay_action_plan
    input type: area
---
template: order_certified_copy_example
subject: |
  Example: We need to order a certified copy
content: |
  We were married in [City, State/Country], and we do not have a certified copy of our marriage certificate yet.
  We requested a certified copy from [agency/city/town/state/country] on [date].
  We are waiting for processing and delivery.

  We will file the certified copy with the court as soon as we receive it.
---
template: translation_example
subject: |
  Example: We need a certified translation
content: |
  Our marriage certificate is not in English.
  We are obtaining a certified English translation from [translator/service].
  We expect to receive the certified translation by [date].

  We will file both the marriage certificate and certified translation with the court as soon as they are ready.
---
template: urgent_filing_example
subject: |
  Example: We need to file now while waiting for documents
content: |
  We are filing our joint petition now because we need to move our case forward as soon as possible.
  We do not yet have the certified marriage certificate because [brief reason, such as waiting for mail or processing].
  We are actively working to get the required documents.

  We will file the certified marriage certificate (and certified translation, if needed) promptly after receiving them.
---
id: Attorney Information
question: |
  Attorney Information
subquestion: |
  Have your attorney's BBO numbers ready.
fields:
  - "Attorney A's BBO number": attorneys[0].bbo_number
    required: False
  - "Attorney B's BBO number": attorneys[1].bbo_number
    required: False
