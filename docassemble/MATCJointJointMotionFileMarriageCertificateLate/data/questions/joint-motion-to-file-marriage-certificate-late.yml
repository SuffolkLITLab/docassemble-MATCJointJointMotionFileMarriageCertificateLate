  description: |-
    This interview helps someone in Massachusetts file a joint motion to file marriage certificate late if not submitting certified copy of marriage certificate with petition.
  can_I_use_this_form: |
    If you are a couple filing a joint petition for divorce you can use this interview to file a joint motion to file marriage certificate late if not submitting certified copy of marriage certificate with petition.
  before_you_start: |
    This interview will help you prepare a joint motion to file your marriage certificate late if you did not include it with your joint petition and other initial filings.
    
    Before you get started, please gather:
    
    1. Marriage information (Date, location)
    2. Information about how to obtain a certified copy of your marriage certificate and/or translation. 
     
    
    When you are finished, you will need to:
    
    1. File this motion with your joint petition. 
    2. Get a certified copy of your marriage certificate (and a certified translation if it is not in English) and file it with the court as soon as possible.
