id: Joint_motion_to_file_marriage_certificate_late
continue button field: jointmotiontofilemarriagecertificatelate_intro
question: |
  Joint motion to file marriage certificate late
subquestion: |
  This interview will help you file a joint motion to file marriage certificate late if not submitting with petition.
  
  Before you get started, please gather:
  
  1. Marriage information (Date, location)
  2. Information about how to obtain a certified copy of your marriage certificate and/or translation. 
   
  
  When you are finished, you will need to:
  
  1. File this motion with your joint petition. 
  2. Obtain a certified copy of your marriage certificate and/or translation and file with the court as soon as possible.

  If you are a couple filing a joint petition for divorce you can use this interview to file a joint motion to file marriage certificate late if not submitting certified copy of marriage certificate with petition.

  Most people take about 10 minutes to complete this interview.
---
id: Marriage Details
question: |
  Marriage Details
subquestion: |
  When and where did ${ users[0] } and ${ users[1] } get married?
fields:
  - "Date of marriage ceremony": marriage_date
    datatype: date
  - "City where marriage took place": marriage_city
  - "Marriage occurred outside the United States?": international_marriage
    datatype: yesnoradio
  - "State where marriage took place": marriage_state
    required: False
    show if:
      variable: international_marriage
      is: False
  - "Country where marriage took place": marriage_country
    required: False
    show if:
      variable: international_marriage
      is: True
---
id: Reason for Delay
